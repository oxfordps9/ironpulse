<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - IRON PULSE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link class="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-gray-100 font-sans antialiased flex flex-col min-h-screen">

    <nav class="bg-gray-950 border-b border-gray-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <div class="flex-shrink-0">
                    <a href="index.html" class="text-2xl font-black tracking-wider text-orange-500">IRON<span class="text-white">PULSE</span></a>
                </div>
                <div class="hidden md:block">
                    <div class="ml-10 flex items-baseline space-x-8 font-medium">
                        <a href="index.html" class="hover:text-orange-500 transition-colors">About Us</a>
                        <a href="packages.html" class="hover:text-orange-500 transition-colors">Packages</a>
                        <a href="gallery.html" class="hover:text-orange-500 transition-colors">Gallery</a>
                        <a href="contact.html" class="text-orange-500 border-b-2 border-orange-500 pb-1">Contact Us</a>
                    </div>
                </div>
                <div>
                    <a href="packages.html" class="bg-orange-500 hover:bg-orange-600 text-white px-6 py-2.5 rounded-full font-semibold transition-all">Join Now</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow py-24 bg-gray-950">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center max-w-3xl mx-auto mb-16">
                <span class="text-orange-500 font-bold uppercase tracking-wider text-sm">Get In Touch</span>
                <h2 class="text-4xl font-extrabold text-white mt-2">Ready to Start Your Journey?</h2>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 items-start">
                <div class="lg:col-span-5 space-y-8">
                    <div class="bg-gray-900 border border-gray-800 p-6 rounded-xl flex items-start space-x-4">
                        <div class="bg-orange-500/10 p-3 rounded-lg text-orange-500"><i class="fa-solid fa-location-dot text-xl w-6 text-center"></i></div>
                        <div>
                            <h4 class="text-lg font-bold text-white">Our Address</h4>
                            <p class="text-gray-400 text-sm mt-1">Main National Highway, Qazi Ahmed, District Shaheed Benazirabad, Sindh, Pakistan</p>
                        </div>
                    </div>

                    <div class="bg-gray-900 border border-gray-800 p-6 rounded-xl flex items-start space-x-4">
                        <div class="bg-orange-500/10 p-3 rounded-lg text-orange-500"><i class="fa-solid fa-envelope text-xl w-6 text-center"></i></div>
                        <div>
                            <h4 class="text-lg font-bold text-white">Email Address</h4>
                            <p class="text-gray-400 text-sm mt-1">contact@ironpulse-gym.com</p>
                        </div>
                    </div>

                    <form id="whatsappForm" class="space-y-4">
                        <div>
                            <label class="block text-sm font-semibold text-gray-400 mb-2">Full Name</label>
                            <input type="text" id="clientName" required placeholder="John Doe" class="w-full bg-gray-900 border border-gray-800 focus:border-orange-500 rounded-lg px-4 py-3 text-white outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-400 mb-2">Message</label>
                            <textarea rows="4" id="clientMessage" required placeholder="How can we help you?" class="w-full bg-gray-900 border border-gray-800 focus:border-orange-500 rounded-lg px-4 py-3 text-white outline-none"></textarea>
                        </div>
                        <button type="button" onclick="sendToWhatsApp()" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-3.5 rounded-lg transition-all shadow-lg flex items-center justify-center space-x-2">
                            <i class="fa-brands fa-whatsapp text-xl"></i>
                            <span>Send via WhatsApp</span>
                        </button>
                    </form>
                </div>

                <div class="lg:col-span-7 h-[480px] w-full rounded-2xl overflow-hidden border border-gray-800 shadow-2xl">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d14371.378940807755!2d68.32000000000001!3d26.080000000000002!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x394c1615faee2977%3A0x6b107e335ee3f47d!2sQazi%20Ahmed%2C%20Shaheed%20Benazirabad%2C%20Sindh%2C%20Pakistan!5e0!3m2!1sen!2s!4v1710000000000!5m2!1sen!2s" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-gray-950 border-t border-gray-800 py-8 text-center text-sm text-gray-500">
        <p>© 2026 IRON PULSE Fitness Center. All Rights Reserved.</p>
    </footer>

    <a href="https://wa.me/923327469126" target="_blank" rel="noopener noreferrer" class="fixed bottom-6 right-6 bg-[#25D366] text-white p-4 rounded-full shadow-2xl z-50">
        <i class="fa-brands fa-whatsapp text-3xl"></i>
    </a>

    <script>
    function sendToWhatsApp() {
        // Aapka WhatsApp Number (Country code lagayein bina "+" sign ke)
        const phoneNumber = "923327469126"; 

        const name = document.getElementById('clientName').value.trim();
        const message = document.getElementById('clientMessage').value.trim();

        if (name === "" || message === "") {
            alert("Please fill out both fields before sending.");
            return;
        }

        // WhatsApp ke liye text formatting template
        const textTemplate = `*New Gym Inquiry* 🔥%0A%0A*Name:* ${encodeURIComponent(name)}%0A*Message:* ${encodeURIComponent(message)}`;
        const whatsappUrl = `https://wa.me/${phoneNumber}?text=${textTemplate}`;

        window.open(whatsappUrl, '_blank');
    }

    // Auto load plan choice if clicked from packages.html
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const selectedPackage = urlParams.get('package');
        if (selectedPackage) {
            document.getElementById('clientMessage').value = `I am interested in joining the "${selectedPackage} Tier" membership plan. Please share more details.`;
        }
    }
    </script>
</body>
</html>
